<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt | Ájina za Jedna</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="LogoClean.png" alt="Ájina za Jedna">
        <span class="logo-text">Ajina za Jedna</span>
      </a>
      
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Otevřít menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav-links" id="nav-links">
        <a href="index.html">Domů</a>
        <a href="index.html#products">Služby</a>
        <a href="contact.html">Kontakt</a>
      </nav>
    </div>
  </header>

  <main class="container page-hero" style="padding-bottom: 5rem;">
    <div class="contact-grid">
      <div class="contact-info">
        <span class="label-new">Spojme se</span>
        <h1>Napiš mi</h1>
        <p>Máš nějaké dotazy o kurzech nebo materiálech? Napiš mi a já ti co nejdříve odpovím.</p>
        
        <div style="margin-top: 3rem; display: flex; flex-direction: column; gap: 1rem;">
          <div>
             <span style="font-size: 0.7rem; text-transform: uppercase; color: var(--accent-green); font-weight: 700;">Rezervace</span>
             <p style="margin-top: 0.2rem; font-size: 1.1rem;"><a href="https://tidycal.com/barcavanova" target="_blank" style="color: var(--text-main); text-decoration: none; border-bottom: 2px solid var(--accent-green);">tidycal.com/barcavanova</a></p>
          </div>
          <div>
            <span style="font-size: 0.7rem; text-transform: uppercase; color: var(--accent-green); font-weight: 700;">Email</span>
            <p style="margin-top: 0.2rem; font-size: 1.1rem; color: var(--text-main);">hello@barbora-english.com</p>
          </div>
          <div>
            <span style="font-size: 0.7rem; text-transform: uppercase; color: var(--accent-green); font-weight: 700;">Instagram</span>
            <p style="margin-top: 0.2rem; font-size: 1.1rem; color: var(--text-main);">@barbora_english</p>
          </div>
        </div>
      </div>
      
      <form class="contact-form" style="background: var(--white); padding: 3rem; border-radius: 4px; box-shadow: var(--shadow-lg);">
        <div class="form-group">
          <input type="text" placeholder="TVOJE JMÉNO" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="TVŮJ EMAIL" required>
        </div>
        <div class="form-group">
          <textarea rows="5" placeholder="JAK TI MOHU POMOCI?"></textarea>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Odeslat zprávu</button>
      </form>
    </div>
  </main>

  <script>
    const mobileToggle = document.getElementById('mobile-toggle');
    const navLinks = document.getElementById('nav-links');

    mobileToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });

    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
      });
    });
  </script>

</body>
</html>
